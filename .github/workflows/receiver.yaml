name: Shadow receiver

# This repo (the "runner") is only the venue where shadow PRs are opened so a consumer's CI runs in
# isolation. ALL shadow-testing logic lives in the workflows repo (stefanpenner-cs/reusable-workflows)
# under shadow/ (Go, built with Bazel). This shim is dispatched by that repo's shadow flow; it checks
# the workflows repo out at the given ref and runs `bazelisk run //shadow/cmd/mirror-and-test` (which
# opens the shadow PR here). workflow_dispatch only (so it never re-fires on the shadow PRs it
# creates), and the run id returns via return_run_details.
# SECURITY MODEL — read before changing the trigger. Full write-up + runtime test in the workflows
# repo: shadow/SECURITY.md (verified by //shadow/cmd/check-dispatch-auth).
#
# This is workflow_dispatch ONLY, and that is load-bearing. The job checks out
# `inputs.workflows_repo` at `inputs.workflows_ref` and runs THAT checkout's Go
# (`bazelisk run //shadow/cmd/mirror-and-test`) with `secrets.SHADOW_PAT` in scope and
# contents/pull-requests write. So whoever dispatches fully controls what code executes with
# the secret: the dispatcher is a fully trusted principal, not an arbitrary caller.
#
# Who can dispatch (and only these):
#   - principals with write/maintain/admin on THIS runner repo (UI / `gh workflow run` / REST), and
#   - any holder of a token with actions:write here — in practice SHADOW_PAT, which the workflows
#     repo's shadow flow uses to dispatch programmatically.
# Who CANNOT: fork contributors, read-only collaborators, the public, and another repo's default
# GITHUB_TOKEN. (workflow_dispatch requires actions:write — GitHub withholds it from all of these.)
#
# The workflow *definition* always runs from the dispatched `ref` (the flow passes `main`), so this
# file can't be swapped by a PR. But `inputs` are otherwise UNTRUSTED strings — workflows_repo,
# consumer_repo, and the refs are not constrained here. They must be validated by the Go entrypoint
# (allow-list the provider + consumer repos, require a 40-hex SHA for workflows_ref); do not rely on
# this shim to bound them.
on:
  workflow_dispatch:
    inputs:
      workflows_repo:
        description: owner/repo of the reusable-workflows provider
        required: true
        type: string
      workflows_ref:
        description: workflows PR head SHA — pinned into consumers and used to run shadow/
        required: true
        type: string
      consumer_repo:
        description: owner/repo of the consumer to mirror
        required: true
        type: string
      consumer_ref:
        description: consumer ref to mirror
        required: true
        type: string
      workflows_pr:
        description: workflows PR number (for labelling)
        required: true
        type: string
      branch:
        description: deterministic shadow branch name
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: shadow-${{ inputs.branch }}
  cancel-in-progress: true

jobs:
  mirror-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.workflows_repo }}
          ref: ${{ inputs.workflows_ref }}
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Mirror consumer + run its CI against the workflows draft
        env:
          SHADOW_PAT: ${{ secrets.SHADOW_PAT }}
        run: bazelisk run //shadow/cmd/mirror-and-test --
          --workflows-repo=${{ inputs.workflows_repo }}
          --workflows-ref=${{ inputs.workflows_ref }}
          --consumer-repo=${{ inputs.consumer_repo }}
          --consumer-ref=${{ inputs.consumer_ref }}
          --workflows-pr=${{ inputs.workflows_pr }}
          --branch=${{ inputs.branch }}
          --runner-repo=${{ github.repository }}
